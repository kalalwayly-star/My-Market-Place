<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_page_title">Login - Classified Site</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
    
<body class="auth-page-body">

<div class="auth-wrapper">
    <div class="form-card">
        <h2 data-i18n="welcome_back">Welcome Back</h2>
        <p class="subtitle" data-i18n="login_subtitle">Please enter your details to sign in.</p>

        <div id="error-message" class="error-text" style="text-align: center; margin-bottom: 15px;"></div>

        <!-- Email -->
        <div class="input-group">
            <label data-i18n="label_email">Email</label>
            <input type="email" id="loginEmail" data-i18n-placeholder="placeholder_email" placeholder="Enter your email" required>
        </div>

        <!-- Password -->
        <div class="input-group password-group">
            <label data-i18n="label_password">Password</label>
            <input type="password" id="loginPassword" data-i18n-placeholder="placeholder_password" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" id="toggleLoginPassword"></i>
        </div>

        <!-- FORGOT PASSWORD (Right under the password field) -->
        <div class="login-footer" style="text-align: right; margin-bottom: 20px;">
            <a href="forgot.html" id="forgotPasswordLink" data-i18n="forgot_password" style="font-size: 13px; color: #007bff; text-decoration: none;">
                Forgot Password?
            </a>
        </div>

        <!-- Login Button -->
<button type="submit" class="btn-primary" data-i18n="login_btn">Login</button>
        
        <div class="divider"><span data-i18n="or_divider">OR</span></div>

        <!-- Register Button -->
        <button type="button" class="btn-secondary" onclick="window.location.href='register.html'" data-i18n="create_account_btn">
            Create Account
        </button>
    </div>
</div>
    <script src="languages.js"></script>

<script type="module" src="auth.js"></script>

<script>
    // Eye toggle functionality
    const toggleBtn = document.querySelector('#toggleLoginPassword');
    const passwordField = document.querySelector('#loginPassword');
    if(toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    }
</script>

</body>
</html>
