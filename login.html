<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">Login | Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 15px;">
        <h1 data-i18n="myTitle">My Marketplace</h1>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
        </div>
    </div>
</header>

<main class="login-container" style="max-width: 400px; margin: 50px auto; padding: 20px;">
    <div class="form-card" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 data-i18n="login_header" style="text-align: center; margin-bottom: 20px;">Login to Your Account</h2>
        
        <form id="loginForm">
            <div class="input-group" style="margin-bottom: 15px;">
                <label data-i18n="label_email">Email Address</label>
                <input type="email" id="loginEmail" data-i18n-placeholder="placeholder_email" placeholder="name@example.com" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label data-i18n="label_password">Password</label>
                <input type="password" id="loginPassword" data-i18n-placeholder="placeholder_password" placeholder="••••••••" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
            </div>

            <button type="submit" class="btn-primary-large" style="width: 100%; padding: 12px; cursor: pointer;" data-i18n="login_btn">Login</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <span data-i18n="no_account">Don't have an account?</span> 
            <a href="register.html" data-i18n="register_link">Register here</a>
        </p>
    </div>
</main>

<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="main.js"></script>
<script src="languages.js"></script>

</body>
</html>
