<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_page_title">Login - Classified Site</title>
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
    
<body class="auth-page-body">

<div class="auth-wrapper">
    <div class="form-card">
        <h2 data-i18n="welcome_back">Welcome Back</h2>
        <p class="subtitle" data-i18n="login_subtitle">Please enter your details to sign in.</p>

        <!-- Error Message Display -->
        <div id="error-message" class="error-text" style="text-align: center; margin-bottom: 15px;"></div>

        <!-- Email Input -->
        <div class="input-group">
            <label data-i18n="label_email">Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <!-- Password Input -->
        <div class="input-group password-group">
            <label data-i18n="label_password">Password</label>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" id="toggleLoginPassword" role="button" aria-label="Toggle Password Visibility"></i>
        </div>

        <!-- Forgot Password Link -->
        <div class="login-footer" style="text-align: right; margin-bottom: 20px;">
            <a href="forgot.html" id="forgotPasswordLink" data-i18n="forgot_password" style="font-size: 13px; color: #007bff; text-decoration: none;">
                Forgot Password?
            </a>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <button type="submit" class="btn-primary" data-i18n="login_btn">Login</button>
        </form>
        
        <div class="divider"><span data-i18n="or_divider">OR</span></div>

        <!-- Register Button -->
        <button type="button" class="btn-secondary" onclick="window.location.href='register.html'" data-i18n="create_account_btn">
            Create Account
        </button>
    </div>
</div>

<script>
    // Password visibility toggle functionality
    const toggleBtn = document.querySelector('#toggleLoginPassword');
    const passwordField = document.querySelector('#loginPassword');
   if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    }

    // Login function using localStorage
    function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorMsg = document.getElementById('error-message');

        // Clear any previous error message
        errorMsg.innerText = '';

        // Input validation
        if (!email || !password) {
            errorMsg.innerText = "Please fill in all fields.";
            return;
        }

        // Attempt to log in with localStorage-based method
        loginUser(email, password);
    }

    // Login user from localStorage
    function loginUser(email, password) {
        const users = JSON.parse(localStorage.getItem("users") || "[]");

        // Check if the user exists
        const user = users.find(user => user.email === email && user.password === password);

        if (user) {
            console.log('User logged in:', user);
            localStorage.setItem("currentUser", JSON.stringify(user)); // Store logged-in user
            window.location.href = "index.html"; // Redirect to the homepage after login
        } else {
            console.error('Invalid credentials');
            alert('Invalid email or password');
        }
    }
</script>

<script src="languages.js"></script>
<script src="auth.js"></script>

</body>
</html>
