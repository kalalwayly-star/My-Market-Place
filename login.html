<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Classified Site</title>
    <!-- FIX 1: Corrected Font Awesome Link (was cloudflare.com) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    <!-- FIX 2: Versioning should match your actual file save -->
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
    
<body class="auth-page-body">

<div class="auth-wrapper">
    <div class="form-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details to sign in.</p>

        <!-- Error Message Placeholder -->
        <div id="error-message" class="error-text" style="text-align: center; margin-bottom: 15px;"></div>

        <!-- Email Field -->
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <!-- Password Field with Eye Toggle -->
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
            <!-- Icon will now show because of the Font Awesome fix -->
            <i class="fas fa-eye" id="toggleLoginPassword"></i>
        </div>

        <!-- Forgot Password Link -->
        <div class="login-footer" style="text-align: right; margin-bottom: 20px;">
            <a href="forgot.html" id="forgotPasswordLink" style="font-size: 13px; color: #007bff; text-decoration: none;">
                Forgot Password?
            </a>
        </div>

        <!-- Action Buttons: Both use matching CSS classes -->
        <button type="button" class="btn-primary" onclick="login()">Login</button>
        
        <div class="divider"><span>OR</span></div>

        <button type="button" class="btn-secondary" onclick="window.location.href='register.html'">
            Create Account
        </button>
    </div>
</div>

<!-- Scripts -->
<script src="auth.js"></script>
<script>
    // Eye toggle logic
    const toggleBtn = document.querySelector('#toggleLoginPassword');
    const passwordField = document.querySelector('#loginPassword');

    if(toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    }
</script>

</body>
</html>
