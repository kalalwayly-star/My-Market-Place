<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="myads_title">My Ads | Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Essential grid styling if not in your style.css */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .ad-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            padding: 10px;
        }
        .ad-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #f0f0f0;
        }
        .no-ads { text-align: center; grid-column: 1/-1; padding: 50px; color: gray; }
    </style>
</head>
<body>

<header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <h1>My Marketplace</h1>
        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn" data-i18n="postAd">Post Ad</a>
        </div>
    </div>
</header>

<main class="myads-container" style="max-width:1200px; margin: 20px auto; padding: 0 15px;">
    <div class="section-header">
        <h2 data-i18n="your_active_listings">Your Active Listings</h2>
        <p id="userGreeting" style="color: gray; margin-top: 5px;"></p>
    </div>

    <!-- The container where ads will be injected -->
    <div id="myAds" class="ads-grid">
        <!-- Loading state -->
        <p>Loading your ads...</p>
    </div> 

    <div class="footer-actions" style="margin-top: 20px;">
        <a href="index.html" class="btn text" data-i18n="back_home">← Back to Home</a>
    </div>
</main>

<script src="storage.js"></script>
<script src="main.js"></script>
<script src="languages.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const user = JSON.parse(localStorage.getItem("currentUser"));
    const adsContainer = document.getElementById("myAds");
    const greetingEl = document.getElementById("userGreeting");

    // 1. Show user email
    if (user && greetingEl) {
        greetingEl.innerText = user.email;
    }

    // 2. Load and Render Ads
    function renderMyAds() {
        // Retrieve ads from localStorage (Assuming key is 'ads')
        const allAds = JSON.parse(localStorage.getItem("ads")) || [];
        
        // Filter ads belonging to the logged-in user
        const userAds = allAds.filter(ad => ad.userEmail === user?.email);

        if (userAds.length === 0) {
            adsContainer.innerHTML = '<div class="no-ads">You haven\'t posted any ads yet.</div>';
            return;
        }

        adsContainer.innerHTML = userAds.map(ad => `
            <div class="ad-card">
                <img src="${ad.image || 'https://placeholder.com'}" 
                     alt="${ad.title}" 
                     onerror="this.src='https://placeholder.com'">
                <h3>${ad.title}</h3>
                <p>$${ad.price}</p>
                <button onclick="deleteAd('${ad.id}')" style="color: red; border: none; background: none; cursor: pointer;">Delete</button>
            </div>
        `).join('');
    }

    // Initialize display
    renderMyAds();
});

// Helper to delete an ad (linked to the button above)
function deleteAd(id) {
    if(confirm("Are you sure you want to delete this ad?")) {
        let ads = JSON.parse(localStorage.getItem("ads")) || [];
        ads = ads.filter(a => a.id !== id);
        localStorage.setItem("ads", JSON.stringify(ads));
        location.reload(); 
    }
}
</script>

</body>
</html>
