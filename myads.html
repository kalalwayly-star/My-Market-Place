<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Ads | Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto;">
        <h1>My Marketplace</h1>
         </div>
        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text">Home</a>
            <a href="post.html" class="btn">Post Ad</a>
        </div>
  
</header>

<section class="container main-content">
    <div class="section-header">
        <h2>Your Active Listings</h2>
        <p id="userGreeting"></p>
    </div>

    <!-- main.js will inject ads into this div -->
    <div id="myAds" class="ads-grid">
        <p class="loading">Loading your ads...</p>
    </div> 
    
    <div class="footer-actions">
        <br>
        <a href="index.html" class="btn text">← Back to Home</a>
    </div>
</section>

<!-- LOAD SCRIPTS IN THIS ORDER -->
<script src="storage.js"></script>
<script src="main.js"></script>
<script src="myads.js"></script> <!-- Added myads.js for handling ads -->

<script>
    // Personalize the greeting if logged in
    const user = JSON.parse(localStorage.getItem("currentUser"));
    if (user) {
        document.getElementById('userGreeting').innerText = `Managing ads for: ${user.email}`;
    }
</script>
// Inside your loop where you display ads:
const adHTML = `
    <div class="myad-card">
        <div class="myad-img-wrapper">
            <img src="${ad.image}" alt="${ad.title}">
        </div>
        <div class="myad-content">
            <div>
                <h3>${ad.title}</h3>
                <p class="myad-price">$${ad.price}</p>
            </div>
            <div class="myad-actions">
                <button class="btn" onclick="editAd(${ad.id})">Edit</button>
                <button class="btn" style="background:#d9534f;" onclick="deleteAd(${ad.id})">Delete</button>
            </div>
        </div>
    </div>
`;

</body>
</html>
