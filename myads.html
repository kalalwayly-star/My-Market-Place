<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="myads_title">My Ads | Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto;">

        <h1 data-i18n="app_name">My Marketplace</h1>

        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn" data-i18n="postAd">Post Ad</a>
        </div>

    </div>
</header>

<!-- MAIN CONTENT -->
<main class="myads-container" style="max-width:1200px; margin:20px auto; padding:0 15px;">

    <div class="section-header">
        <h2 data-i18n="your_active_listings">Your Active Listings</h2>
        <p id="userGreeting" style="color:gray; margin-top:5px;"></p>
    </div>

    <!-- ADS GRID -->
    <div id="myAds" class="ads-grid">
        <p class="loading" data-i18n="loading_ads">Loading your ads...</p>
    </div>
<!-- Gallery Preview -->
<div id="galleryPreview" class="gallery-grid">
    <!-- Example image container -->
    <div class="image-container" id="image-1">
        <img src="assets/my-real-image.png" alt="My Ad">
        <button class="delete-btn" onclick="deleteImage('image-1')">Delete</button>
    </div>
    <!-- Add more image containers as required -->
</div>
    <!-- FOOTER -->
    <div class="footer-actions" style="margin-top:20px;">
        <a href="index.html" class="btn text" data-i18n="back_home">← Back to Home</a>
    </div>

</main>
   <div id="listings"></div>



<!-- ✅ FIXED USER GREETING (FIREBASE ONLY - SAFE) -->
<script type="module">
import { auth } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


document.addEventListener("DOMContentLoaded", () => {

    const el = document.getElementById("userGreeting");

    onAuthStateChanged(auth, (user) => {
        if (user && el) {
            el.innerText = user.email;
        } else if (el) {
            el.innerText = "Not logged in";
        }
    });

});
</script>
<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="languages.js"></script>
<script type="module" src="main.js"></script>

</body>
</html>
