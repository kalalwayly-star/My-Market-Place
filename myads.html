<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ads | Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <h1>My Marketplace</h1>

        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text">Home</a>
            <a href="post.html" class="btn">Post Ad</a>
        </div>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="myads-container" style="max-width:1200px; margin: 20px auto; padding: 0 15px;">

    <div class="section-header">
        <h2>Your Active Listings</h2>
        <p id="userGreeting" style="color: gray; margin-top: 5px;"></p>
    </div>

    <!-- ADS GRID -->
    <div id="myAds" class="ads-grid">
        <p class="loading">Loading your ads...</p>
    </div> 
    
    <!-- FOOTER ACTION -->
    <div class="footer-actions" style="margin-top: 20px;">
        <a href="index.html" class="btn text">← Back to Home</a>
    </div>

</main>

<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="main.js"></script>
<script src="myads.js"></script>

<!-- INLINE SCRIPT -->
<script>
    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (user) {
        const greetingEl = document.getElementById("userGreeting");
        if (greetingEl) {
            greetingEl.innerText = `Managing ads for: ${user.email}`;
        }
    }
</script>

</body>
</html>
