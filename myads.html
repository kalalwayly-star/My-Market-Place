<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="myads_title">My Ads | Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px 0; }
        .ad-card { border: 1px solid #ddd; border-radius: 12px; padding: 15px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .ad-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #f9f9f9; }
        .no-ads { text-align: center; color: #888; padding: 40px; font-size: 1.1em; }
        .debug-panel { background: #fee; border: 1px red solid; padding: 10px; margin: 10px 0; font-family: monospace; display: none; }
    </style>
</head>
<body>

<header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 15px;">
        <h1>My Marketplace</h1>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn" data-i18n="postAd">Post Ad</a>
        </div>
    </div>
</header>

<main class="myads-container" style="max-width:1200px; margin: 20px auto; padding: 0 15px;">
    <div id="debug" class="debug-panel"></div>

    <div class="section-header">
        <h2 data-i18n="your_active_listings">Your Active Listings</h2>
        <p id="userGreeting" style="color: gray; margin-top: 5px;"></p>
    </div>

    <div id="myAds" class="ads-grid"></div> 

    <div class="footer-actions">
        <a href="index.html" class="btn text" data-i18n="back_home">← Back to Home</a>
    </div>
</main>

<script src="storage.js"></script>
<script src="main.js"></script>
<script src="languages.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const adsContainer = document.getElementById("myAds");
    const user = JSON.parse(localStorage.getItem("currentUser"));
    const debug = document.getElementById("debug");

    // 1. Check if user is logged in
    if (!user) {
        adsContainer.innerHTML = '<p class="no-ads">Please log in to see your ads.</p>';
        return;
    }
    document.getElementById("userGreeting").innerText = user.email || user.username;

    // 2. DIAGNOSTIC: Find the correct key and structure
    const storageKeys = ["ads", "allAds", "listings", "myAds"];
    let adsData = [];
    let foundKey = "";

    storageKeys.forEach(key => {
        const data = localStorage.getItem(key);
        if (data && adsData.length === 0) {
            adsData = JSON.parse(data);
            foundKey = key;
        }
    });

    // 3. Render logic
    function render() {
        // Filter ads for current user (checks both .email and .userEmail fields)
        const userAds = adsData.filter(ad => (ad.userEmail === user.email || ad.userId === user.id));

        if (userAds.length === 0) {
            adsContainer.innerHTML = `<div class="no-ads">No ads found for ${user.email}.</div>`;
            return;
        }

        adsContainer.innerHTML = userAds.map(ad => {
            // Check for common image field names
            const imgSrc = ad.image || ad.photo || ad.img || ad.imageUrl || 'https://placeholder.com';
            
            return `
                <div class="ad-card">
                    <img src="${imgSrc}" alt="${ad.title}" onerror="this.src='https://placeholder.com'">
                    <h3>${ad.title || 'Untitled Ad'}</h3>
                    <p style="font-weight:bold; color:#2c3e50;">$${ad.price || '0.00'}</p>
                    <button onclick="deleteThisAd('${ad.id}')" style="margin-top:10px; color:red; cursor:pointer; border:none; background:none;">Delete Listing</button>
                </div>
            `;
        }).join('');
    }

    render();
});

function deleteThisAd(id) {
    if (confirm("Delete this ad?")) {
        const key = "ads"; // Change this if your storage key is different
        let allAds = JSON.parse(localStorage.getItem(key)) || [];
        allAds = allAds.filter(a => a.id != id);
        localStorage.setItem(key, JSON.stringify(allAds));
        location.reload();
    }
}
</script>
</body>
</html>
