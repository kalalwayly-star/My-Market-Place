
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="myAdsTitle">My Ads</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .ad-card {
            background-color: #fff;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .ad-card img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .ad-card h4 {
            margin-bottom: 10px;
        }

        .ad-card button {
            margin-right: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: #ff5722;
            color: white;
        }

        .delete-btn:hover {
            background-color: #e64a19;
        }

        .details-btn {
            background-color: #007bff;
            color: white;
        }

        .details-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1 data-i18n="your_ads">Your Ads</h1>
        <div class="nav">
            <a href="index.html" class="btn" data-i18n="home">Home</a>
            <a href="post.html" class="btn" data-i18n="postAd">Post Ad</a>
        </div>
    </div>

    <div id="user-info-header" style="display:none; padding:10px; text-align:right;">
        <span id="header-user-email"></span>
    </div>
</header>

<section class="main-content container">
    <h3 data-i18n="your_ads_list">Your Advertisements</h3>
    <div id="ads-container"></div>
</section>

<footer>
    <div class="container">
        <p><a href="terms.html" data-i18n="footer_terms">Terms</a></p>
        <p><a href="privacy.html" data-i18n="footer_privacy_header">Privacy</a></p>
    </div>
</footer>

<script>
function getLoggedInUser() {
    return JSON.parse(localStorage.getItem('loggedInUser')) || null;
}

function getAdsFromLocalStorage() {
    return JSON.parse(localStorage.getItem('ads')) || [];
}

function displayUserAds() {
    const adsContainer = document.getElementById('ads-container');
    const user = getLoggedInUser();
    const ads = getAdsFromLocalStorage();

    adsContainer.innerHTML = '';

    if (!user) {
        adsContainer.innerHTML = '<p>Please log in to view your ads.</p>';
        return;
    }

    const userAds = ads.filter(ad => ad.userId === user.email);

    if (userAds.length === 0) {
        adsContainer.innerHTML = '<p>No ads posted by you yet.</p>';
        return;
    }

    userAds.forEach(ad => {
        const adDiv = document.createElement('div');
        adDiv.className = 'ad-card';

        adDiv.innerHTML = `
            ${ad.image ? `<img src="${ad.image}" alt="${ad.title}">` : ''}
            <h4>${ad.title}</h4>
            <p>${ad.description}</p>
            <p><b>Category:</b> ${ad.category}</p>
            <p><b>Price: $${ad.price}</b></p>
            <button class="details-btn" onclick="goToAdDetails('${ad.id}')" data-i18n="view_details">View Details</button>
            <button class="delete-btn" onclick="deleteAd('${ad.id}')" data-i18n="delete_ad">Delete</button>
        `;

        adsContainer.appendChild(adDiv);
    });
}

function deleteAd(adId) {
    if (!confirm('Are you sure you want to delete this ad?')) return;

    let ads = getAdsFromLocalStorage();
    ads = ads.filter(ad => ad.id !== adId);

    localStorage.setItem('ads', JSON.stringify(ads));

    displayUserAds();
}

function goToAdDetails(adId) {
    window.location.href = `ad-details.html?id=${adId}`;
}

document.addEventListener('DOMContentLoaded', function() {
    displayUserAds();
});
</script>

<script src="main.js"></script>

</body>
</html>
