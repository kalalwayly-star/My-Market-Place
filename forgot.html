<!-- Font Awesome for the visibility toggle -->
<link rel="stylesheet" href="https://cloudflare.com">

<div class="form-card">
    <h2 id="formTitle">Reset Password</h2>
    
    
    <div id="emailSection" class="form-stage">
        <div class="input-group">
            <label>Enter your Email</label>
            <input type="email" id="resetEmail" required placeholder="name@example.com">
        </div>
        <button type="button" class="btn-primary" onclick="checkUser()">Verify Email</button>
    </div>

    <!-- STAGE 2: Security Question (Hidden) -->
    <div id="securitySection" class="form-stage" style="display:none;">
        <p id="displayQuestion" class="security-text"></p>
        <div class="input-group">
            <input type="text" id="answerInput" placeholder="Your Answer" required>
        </div>
        <button type="button" class="btn-primary" onclick="verifyAnswer()">Verify Answer</button>
    </div>

    <!-- STAGE 3: Password Update (Hidden) -->
    <div id="resetSection" class="form-stage" style="display:none;">
        <div class="input-group password-wrapper">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="At least 6 characters" required>
            <i class="fas fa-eye toggle-icon" onclick="toggleVisibility('newPassword', this)"></i>
        </div>
        
        <div class="input-group password-wrapper">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
            <i class="fas fa-eye toggle-icon" onclick="toggleVisibility('confirmPassword', this)"></i>
        </div>
        
        <button type="button" class="btn-primary" onclick="finalizeReset()">Update Password</button>
    </div>
</div>
<div class="form-card">
    <!-- ... your existing stages (emailSection, securitySection, etc.) ... -->

    <hr style="margin-top: 20px; border: 0; border-top: 1px solid #eee;">

            Back to Login
        </a>
    </div>
</div>
