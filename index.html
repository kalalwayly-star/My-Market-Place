<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="greeting">Marketplace | Find Anything</title>

    <link rel="stylesheet" href="style.css">
    <script src="languages.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #111;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: auto;
        }

        /* TOP NAV */
        .top-bar {
            background: #4caf50;
            border-bottom: 2px solid #000;
            padding: 15px 0;
        }

        .top-bar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-links,
        .lang-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a,
        .lang-buttons button,
        #logout-btn {
            background: white;
            color: black;
            border: 1px solid black;
            padding: 8px 16px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover,
        .lang-buttons button:hover,
        #logout-btn:hover {
            background: black;
            color: white;
        }

        #user-info-header {
            font-size: 14px;
            font-weight: bold;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: white;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            padding: 40px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-container input {
            padding: 12px;
            width: 280px;
            border: 1px solid #000;
            border-radius: 4px;
        }

        .btn-search {
            padding: 12px 25px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        /* CATEGORIES */
        .categories-section {
            padding: 40px 0;
        }

        .categories-section h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .cat-card {
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-card:hover {
            border-color: black;
            transform: translateY(-3px);
        }

        .cat-card span {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* ADS */
        .main-content {
            padding: 40px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-link {
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            color: black;
        }

        /* FOOTER */
        footer {
            border-top: 2px solid black;
            padding: 30px 0;
            text-align: center;
            background: white;
        }

        footer a {
            color: black;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        footer p {
            margin: 8px 0;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="container top-bar-inner">

        <!-- NAVIGATION -->
        <div class="nav-links">
            <a href="index.html" data-i18n="home">Home</a>
            <a href="messages.html" data-i18n="messages">Messages</a>
            <a href="myads.html" data-i18n="myAds">My Ads</a>
            <a href="post.html" data-i18n="postAd">Post Ad</a>
        </div>

        <!-- USER INFO -->
        <div id="user-info-header" style="display:none;">
            <span data-i18n="logged_in_as">Logged in as:</span>
            <span id="header-user-email"></span>
        </div>

        <!-- AUTH -->
        <div class="nav-links">
            <a id="userAuth" href="login.html" data-i18n="login">Login</a>
            <button id="logout-btn" onclick="logout()" style="display:none;" data-i18n="logout">Logout</button>
        </div>

        <!-- LANGUAGES -->
        <div class="lang-buttons">
            <button onclick="setLanguage('en')">English</button>
            <button onclick="setLanguage('fr')">Français</button>
            <button onclick="setLanguage('es')">Español</button>
            <button onclick="setLanguage('ar')">العربية</button>
        </div>

    </div>
</div>

<!-- HEADER -->
<header class="header">
    <div class="container">
        <h1 data-i18n="site_name">My Marketplace</h1>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="container">
        <h2 data-i18n="hero_title">Find anything in your city</h2>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="What are you looking for?" data-i18n-placeholder="search_placeholder">
            <input type="text" id="locationInput" placeholder="City or Neighborhood" data-i18n-placeholder="location_placeholder">
            <button onclick="applyFilters()" class="btn-search" data-i18n="search">Search</button>
        </div>
    </div>
</section>

<!-- CATEGORIES -->
<section class="categories-section container">
    <h3 data-i18n="browse_categories">Browse Categories</h3>
    <div class="category-grid" id="categoryGrid"></div>
</section>

<!-- ADS -->
<section class="main-content container">
    <div class="section-header">
        <h3 data-i18n="latest_ads">Latest Ads</h3>
        <button onclick="resetFilters()" class="btn-link" data-i18n="view_all">View All</button>
    </div>

    <div id="listings" class="grid"></div>

    <p id="no-items-message" style="display:none; text-align:center;" data-i18n="no_items_found">
        No items found.
    </p>
</section>

<!-- FOOTER -->
<footer>
    <div class="container">
        <p><a href="terms.html" data-i18n="footer_terms">Terms</a></p>
        <p><a href="safety.html" data-i18n="footer_safety">Safety</a></p>
        <p><a href="privacy.html" data-i18n="footer_privacy">Privacy</a></p>
    </div>
</footer>

<script>
function checkLoginStatus() {
    const userRaw = localStorage.getItem('loggedInUser');
    const userEmail = document.getElementById('header-user-email');
    const loginBtn = document.getElementById('userAuth');
    const logoutBtn = document.getElementById('logout-btn');
    const userHeader = document.getElementById('user-info-header');

    if (userRaw) {
        const user = JSON.parse(userRaw);

        if (user && user.email) {
            userEmail.innerText = user.email;
            userHeader.style.display = 'block';
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
        }
    } else {
        userHeader.style.display = 'none';
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
    }
}

function logout() {
    localStorage.removeItem('loggedInUser');
    localStorage.removeItem('currentUser');
    checkLoginStatus();
    window.location.href = "index.html";
}

function fetchCategories() {
    const categories = [
        { name: 'Real Estate', icon: '🏠' },
        { name: 'Cars', icon: '🚗' },
        { name: 'Furniture', icon: '🛋️' },
        { name: 'Auto Accessories', icon: '🛠️' },
        { name: 'Electronics', icon: '📱' },
        { name: 'Fashion', icon: '👗' },
        { name: 'Pets', icon: '🐶' },
        { name: 'Sports', icon: '⚽' },
        { name: 'Books', icon: '📚' },
        { name: 'Appliances', icon: '🔌' },
        { name: 'Toys', icon: '🧸' },
        { name: 'Services', icon: '💼' },
        { name: 'Garden', icon: '🌱' },
        { name: 'Health', icon: '💊' },
        { name: 'Baby', icon: '👶' }
    ];

    const categoryGrid = document.getElementById('categoryGrid');
    categoryGrid.innerHTML = '';

    categories.forEach(category => {
        const categoryCard = document.createElement('div');
        categoryCard.className = 'cat-card';

        categoryCard.innerHTML = `
            <span>${category.icon}</span>
            <p>${category.name}</p>
        `;

        categoryCard.onclick = function() {
            filterByCategory(category.name);
        };

        categoryGrid.appendChild(categoryCard);
    });
}

function filterByCategory(category) {
    if (typeof displayAllAds === "function") {
        const ads = JSON.parse(localStorage.getItem("ads") || "[]");
        const filtered = ads.filter(ad => ad.category === category);
        displayAllAds(filtered);
    }
}

window.onload = function() {
    fetchCategories();
    checkLoginStatus();

    if (typeof displayAllAds === "function") {
        displayAllAds();
    }
};
</script>

<script src="storage.js"></script>
<script src="main.js"></script>

</body>
</html>
