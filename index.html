
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title data-i18n="greeting">Marketplace | Find Anything</title>
   <link rel="stylesheet" href="style.css">
   <link rel="icon" href="favicon.ico" type="image/x-icon">
   <style>
       .cat-card, .btn-search, .btn-link, .card { cursor: pointer; }
       .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; }
       .cat-card { text-align: center; padding: 15px; border: 1px solid #eee; border-radius: 8px; transition: 0.2s; }
       .cat-card:hover { background: #f9f9f9; transform: translateY(-3px); }
       .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
   </style>
</head>

<body>

<header class="header">
    <div class="container">
        <h1 data-i18n="greeting">My Marketplace</h1>
        <div class="lang-buttons">
            <button id="lang-en" data-i18n="lang_en">English</button>
            <button id="lang-fr" data-i18n="lang_fr">Français</button>
            <button id="lang-es" data-i18n="lang_es">Español</button>
            <button id="lang-ar" data-i18n="lang_ar">العربية</button>
        </div>
        <br><br>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="messages.html" class="btn text" data-i18n="nav_messages">Messages</a>
            <a href="myads.html" class="btn secondary" data-i18n="myAds">My Ads</a>
            <a href="post.html" class="btn primary" data-i18n="postAd">Post Ad</a>
            <a id="userAuth" href="login.html" class="btn" data-i18n="nav_login">Login</a>
            <button id="logout-btn" class="btn logout-btn" style="display:none;" data-i18n="nav_logout">Logout</button>            
        </div>

        <div id="user-info-header" style="display:none; padding:10px; text-align:right;">
            <span data-i18n="logged_in_as">Logged in as:</span>
            <span id="header-user-email" style="font-weight:bold; color:#007bff;"></span>
        </div>
    </div>
</header>

<section class="hero">
   <div class="hero-content">
       <h2 data-i18n="hero_title">Find anything in your city</h2>
       <div class="search-container">
           <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="What are you looking for?">
           <input type="text" id="locationInput" data-i18n-placeholder="location_placeholder" placeholder="City or Neighborhood">
           <button onclick="applyFilters()" class="btn-search" data-i18n="btn_search">Search</button>
       </div>
   </div>
</section>

<section class="categories-section container">
    <h3 data-i18n="cat_header">Browse Categories</h3>
    <div class="category-grid" id="categoryGrid">
        <!-- Categories will be dynamically inserted here -->
    </div>
</section>

<section class="main-content container">
    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 data-i18n="viewTitle">Latest Ads</h3>
        <button onclick="resetFilters()" class="btn-link" data-i18n="btn_view_all" style="background: none; border: none; color: #007bff; text-decoration: underline;">View All</button>
    </div>
    <div id="listings" class="grid"></div>

    <p id="no-items-message" style="display:none; text-align:center;" data-i18n="no_items">No items found.</p>
</section>

<script>
// Check login status
function checkLoginStatus() {
    const user = localStorage.getItem('loggedInUser');
    const userEmail = document.getElementById('header-user-email');
    const loginBtn = document.getElementById('userAuth');
    const logoutBtn = document.getElementById('logout-btn');

    if (user) {
        userEmail.innerText = user;
        document.getElementById('user-info-header').style.display = 'block';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    // 1. Handle Email Display
    const userData = localStorage.getItem('loggedInUser');
    const displayElement = document.getElementById('user-email-display');

    if (userData && displayElement) {
        const user = JSON.parse(userData);
        displayElement.textContent = user.email; // Shows only the email
    }

    // 2. Handle Logout Button
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('loggedInUser');
            window.location.href = "login.html";
        });
    }
});


// Fetch and display categories
function fetchCategories() {
    const categories = [
        { name: 'Real Estate', icon: '🏠' },
        { name: 'Cars', icon: '🚗' },
        { name: 'Furniture', icon: '🛋️' },
        { name: 'Auto Accessories', icon: '🛠️' },
        { name: 'Electronics', icon: '📱' },
        { name: 'Fashion', icon: '👗' },
        { name: 'Pets', icon: '🐶' },
        { name: 'Sports', icon: '⚽' },
        { name: 'Books', icon: '📚' },
        { name: 'Appliances', icon: '🔌' },
        { name: 'Toys', icon: '🧸' },
        { name: 'Services', icon: '💼' },
        { name: 'Garden', icon: '🌱' },
        { name: 'Health', icon: '💊' },
        { name: 'Baby', icon: '👶' }
    ];

    const categoryGrid = document.getElementById('categoryGrid');
    categoryGrid.innerHTML = '';  // Clear previous content
    categories.forEach(category => {
        const categoryCard = document.createElement('div');
        categoryCard.classList.add('cat-card');
        categoryCard.innerHTML = `
            <span class="icon" style="font-size: 2rem;">${category.icon}</span>
            <p>${category.name}</p>
        `;
        categoryCard.onclick = function() {
            filterByCategory(category.name);
        };
        categoryGrid.appendChild(categoryCard);
    });
}

// Placeholder function for category filtering
function filterByCategory(category) {
    console.log('Filtering by category:', category);
}

// Load categories and check login status on page load
window.onload = function() {
    checkLoginStatus();  // Check login status
    fetchCategories();    // Fetch and display categories
};
</script>

<footer>
    <div id="footer" class="container" style="text-align: center; padding: 40px 0; border-top: 1px solid #eee;">
        <p style="display: inline; margin: 0 10px;"><a href="terms.html" data-i18n="footer_terms">Terms</a></p>
        <p style="display: inline; margin: 0 10px;"><a href="safety.html" data-i18n="footer_safety">Safety</a></p>
        <p style="display: inline; margin: 0 10px;"><a href="privacy.html" data-i18n="footer_privacy_header">Privacy</a></p>
    </div>
</footer>

<script src="storage.js"></script>
<script src="languages.js"></script>
<script src="post.js"></script>   <!-- For auth.js, if it's using modules --></body>
</html>
