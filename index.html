<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title data-i18n="greeting">Marketplace | Find Anything</title>
   <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container">

        <!-- BRAND -->
        <h1 data-i18n="greeting">My Marketplace</h1>

        <!-- LANGUAGE SWITCH -->
        <div class="lang-buttons">
            <button id="lang-en">English</button>
            <button id="lang-fr">Français</button>
            <button id="lang-es">Español</button>
            <button id="lang-ar">العربية</button>
        </div>

        <!-- NAV -->
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home"></a>
            <a href="messages.html" class="btn text" data-i18n="nav_messages"></a>
            <a href="myads.html" class="btn secondary" data-i18n="myAds"></a>
            <a href="post.html" class="btn primary" data-i18n="postAd"></a>

            <span id="userAuth">
                <a href="login.html" class="btn" data-i18n="nav_login"></a>
            </span>

            <button onclick="logout()" class="btn logout-btn" data-i18n="nav_logout"></button>
        </div>

    </div>
</header>

<!-- HERO -->
<section class="hero">
   <div class="hero-content">

       <h2 data-i18n="hero_title">Find anything in your city</h2>

       <div class="search-container">

           <input type="text"
                  data-i18n-placeholder="search_placeholder"placeholder="what are you looking for?">

           <input type="text"
                  data-i18n-placeholder="location_placeholder" placeholder="City or Neighborhood">

           <button onclick="applyFilters()"
                   class="btn-search"
                   data-i18n="btn_search"></button>

       </div>

   </div>
</section>

<!-- CATEGORIES -->
<section class="categories-section">

   <h3 data-i18n="cat_header"></h3>

   <div class="category-grid">

       <div class="cat-card" onclick="filterByCategory('Real Estate')">
           <span class="icon">🏠</span>
           <p data-i18n="cat_realestate"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Cars & Trucks')">
           <span class="icon">🚗</span>
           <p data-i18n="cat_cars_trucks"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Furniture')">
           <span class="icon">🛋️</span>
           <p data-i18n="cat_furniture"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Jobs')">
           <span class="icon">💼</span>
           <p data-i18n="cat_jobs"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Fashion')">
           <span class="icon">👕</span>
           <p data-i18n="cat_fashion"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Pets')">
           <span class="icon">🐾</span>
           <p data-i18n="cat_pets"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Sports')">
           <span class="icon">🏀</span>
           <p data-i18n="cat_sports"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Books')">
           <span class="icon">📚</span>
           <p data-i18n="cat_books"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Appliances')">
           <span class="icon">🍳</span>
           <p data-i18n="cat_appliances"></p>
       </div>

       <div class="cat-card" onclick="filterByCategory('Toys')">
           <span class="icon">🧸</span>
           <p data-i18n="cat_toys"></p>
       </div>

   </div>
</section>

<!-- LISTINGS -->
<section class="main-content container">

   <div class="section-header">
       <h3 data-i18n="viewTitle"></h3>
       <button onclick="resetFilters()" class="btn-link" data-i18n="btn_view_all"></button>
   </div>

   <div id="listings" class="grid"></div>

</section>

<!-- FOOTER -->
<footer>
    <div id="footer">

        <p><a href="terms.html" data-i18n="footer_terms"></a></p>

        <p><a href="safety.html" data-i18n="footer_safety"></a></p>

        <p><a href="privacy.html" data-i18n="footer_privacy_header"></a></p>

    </div>
</footer>

<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="main.js"></script>
<script src="languages.js"></script>

</body>
</html>
