<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Marketplace | Find Anything</title>
   <link rel="stylesheet" href="style.css">
   <link rel="icon" href="favicon.ico" type="image/x-icon">
   <style>
       .cat-card, .btn-search, .btn-link, .card { cursor: pointer; }
       .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; }
       .cat-card { text-align: center; padding: 15px; border: 1px solid #eee; border-radius: 8px; transition: 0.2s; }
       .cat-card:hover { background: #f9f9f9; transform: translateY(-3px); }
       .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
   </style>
</head>

<body>

<header class="header">
    <div class="container">
        <h1>My Marketplace</h1>
        <div class="lang-buttons">
            <button id="lang-en">English</button>
            <button id="lang-fr">Français</button>
            <button id="lang-es">Español</button>
            <button id="lang-ar">العربية</button>
        </div>
        <div class="nav">
            <a href="index.html" class="btn text">Home</a>
            <a href="messages.html" class="btn text">Messages</a>
            <a href="myads.html" class="btn secondary">My Ads</a>
            <a href="post.html" class="btn primary">Post Ad</a>
            <a id="userAuth" href="login.html" class="btn">Login</a>
            <button id="logout-btn" class="btn logout-btn" style="display:none;">Logout</button>            
        </div>

        <div id="user-info-header" style="display:none; padding:10px; text-align:right;">
            <span>Logged in as:</span>
            <span id="header-user-email" style="font-weight:bold; color:#007bff;"></span>
        </div>
    </div>
</header>

<section class="hero">
   <div class="hero-content">
       <h2>Find anything in your city</h2>
       <div class="search-container">
           <input type="text" id="searchInput" placeholder="What are you looking for?">
           <input type="text" id="locationInput" placeholder="City or Neighborhood">
           <button onclick="applyFilters()" class="btn-search">Search</button>
       </div>
   </div>
</section>

<section class="categories-section container">
   <h3>Browse Categories</h3>
   <div class="category-grid">
       <div class="cat-card" onclick="filterByCategory('Real Estate')">
           <span class="icon" style="font-size: 2rem;">🏠</span>
           <p>Real Estate</p>
       </div>
       <div class="cat-card" onclick="filterByCategory('Cars & Trucks')">
           <span class="icon" style="font-size: 2rem;">🚗</span>
           <p>Cars</p>
       </div>
       <div class="cat-card" onclick="filterByCategory('Furniture')">
           <span class="icon" style="font-size: 2rem;">🛋️</span>
           <p>Furniture</p>
       </div>
       <div class="cat-card" onclick="filterByCategory('Jobs')">
           <span class="icon" style="font-size: 2rem;">💼</span>
           <p>Jobs</p>
       </div>
       <div class="cat-card" onclick="filterByCategory('Fashion')">
           <span class="icon" style="font-size: 2rem;">👕</span>
           <p>Fashion</p>
       </div>
       <div class="cat-card" onclick="filterByCategory('Pets')">
           <span class="icon" style="font-size: 2rem;">🐾</span>
           <p>Pets</p>
       </div>
   </div>
</section>

<section class="main-content container">
    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>Latest Ads</h3>
        <button onclick="resetFilters()" class="btn-link" style="background: none; border: none; color: #007bff; text-decoration: underline;">View All</button>
    </div>
    <div id="listings" class="grid"></div>

    <p id="no-items-message" style="display:none; text-align:center;">No items found.</p>
</section>

<footer>
    <div id="footer" class="container" style="text-align: center; padding: 40px 0; border-top: 1px solid #eee;">
        <p style="display: inline; margin: 0 10px;"><a href="terms.html">Terms</a></p>
        <p style="display: inline; margin: 0 10px;"><a href="safety.html">Safety</a></p>
        <p style="display: inline; margin: 0 10px;"><a href="privacy.html">Privacy</a></p>
    </div>
</footer>

<script src="storage.js"></script>
<script src="languages.js"></script>
<script type="module" src="main.js" defer></script>

<script>
// PayPal Button Integration
function displayAds() {
    const listingsContainer = document.getElementById('listings');
    const ads = getAdsFromLocalStorage();

    if (ads.length === 0) {
        document.getElementById('no-items-message').style.display = 'block';
    } else {
        ads.forEach(ad => {
            const adCard = document.createElement('div');
            adCard.classList.add('ad-card');
            adCard.innerHTML = `
                <div class="ad-img-wrapper">
                    <img src="${ad.imageUrl}" alt="Ad Image">
                </div>
                <div class="ad-content">
                    <h3>${ad.title}</h3>
                    <p>${ad.description}</p>
                    <div id="paypal-button-container-${ad.id}"></div> <!-- PayPal button container -->
                </div>
            `;
            listingsContainer.appendChild(adCard);

            // Add PayPal Button dynamically for each ad
            paypal.Buttons({
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: ad.price
                            }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Transaction completed by ' + details.payer.name.given_name);
                    });
                },
                onError: function(err) {
                    console.error(err);
                }
            }).render(`#paypal-button-container-${ad.id}`);
        });
    }
}

// Get Ads from Local Storage
function getAdsFromLocalStorage() {
    return JSON.parse(localStorage.getItem('ads')) || [];
}

// Check if user is logged in
function checkLoginStatus() {
    const user = localStorage.getItem('loggedInUser');
    const userEmail = document.getElementById('header-user-email');
    const loginBtn = document.getElementById('userAuth');
    const logoutBtn = document.getElementById('logout-btn');

    if (user) {
        userEmail.innerText = user;
        document.getElementById('user-info-header').style.display = 'block';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
    }
}

// Logout functionality
document.getElementById('logout-btn').addEventListener('click', function() {
    localStorage.removeItem('loggedInUser');
    window.location.href = "login.html";
});

// On page load, check login status and display ads
window.onload = function() {
    checkLoginStatus();
    displayAds();
};
</script>

</body>
</html>
