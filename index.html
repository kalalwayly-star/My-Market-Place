<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title data-i18n="greeting">Marketplace | Find Anything</title>
   <link rel="stylesheet" href="style.css">
   <link rel="icon" href="favicon.ico" type="image/x-icon">
   
   <style>
       /* Global Styles */
       body {
           font-family: Arial, sans-serif;
           margin: 0;
           padding: 0;
           background-color: #f8f8f8;
       }

       .container {
           width: 80%;
           margin: 0 auto;
       }

       .nav {
           background-color: #333;
           padding: 15px;
           text-align: center;
       }

       .nav a {
           color: #fff;
           margin: 0 10px;
           text-decoration: none;
           padding: 10px 20px;
           border-radius: 5px;
       }

       .nav a:hover {
           background-color: #007bff;
       }

       /* Header Styles */
       .header {
           background-color: #4CAF50;
           color: #fff;
           padding: 20px 0;
           text-align: center;
       }

       .header h1 {
           margin: 0;
           font-size: 3em;
       }

       .lang-buttons {
           margin-top: 10px;
           display: flex;
           flex-direction: column; /* Vertically aligned */
           justify-content: center;
           align-items: center;
       }

       .lang-buttons span {
           padding: 5px 0;
           font-size: 1.2em;
           cursor: pointer;
       }

       /* Hero Section Styles */
       .hero {
           background-color: #007bff;
           color: white;
           padding: 40px 0;
           text-align: center;
       }

       .hero h2 {
           font-size: 2.5em;
           margin-bottom: 20px;
       }

       .search-container {
           display: flex;
           justify-content: center;
           margin-top: 20px;
       }

       .search-container input {
           padding: 10px;
           margin: 0 10px;
           font-size: 1em;
           width: 250px;
           border-radius: 5px;
           border: 1px solid #ccc;
       }

       .btn-search {
           background-color: #ff5722;
           color: white;
           padding: 10px 20px;
           border-radius: 5px;
           cursor: pointer;
           font-size: 1em;
       }

       .btn-search:hover {
           background-color: #e64a19;
       }

       /* Categories Section */
       .category-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
           gap: 20px;
           margin-top: 40px;
           justify-items: center;
       }

       .cat-card {
           text-align: center;
           padding: 20px;
           border: 1px solid #eee;
           border-radius: 8px;
           background-color: #fff;
           transition: 0.3s;
       }

       .cat-card:hover {
           background-color: #f9f9f9;
           transform: translateY(-3px);
       }

       .cat-card span {
           font-size: 3em;
           margin-bottom: 15px;
       }

       .cat-card p {
           font-size: 1.2em;
       }

       /* Main Content Section */
       .main-content {
           margin-top: 50px;
           padding: 40px 0;
           background-color: #fff;
       }

       .section-header {
           display: flex;
           justify-content: space-between;
           align-items: center;
       }

       .btn-link {
           background: none;
           border: none;
           color: #007bff;
           text-decoration: underline;
           cursor: pointer;
       }

       /* Footer */
       footer {
           background-color: #f1f1f1;
           padding: 20px 0;
           text-align: center;
           font-size: 1em;
       }

       footer a {
           color: #007bff;
           text-decoration: none;
       }

       footer a:hover {
           text-decoration: underline;
       }
   </style>
</head>

<body>

<!-- Navigation Bar -->
<div class="nav">
    <a href="index.html" class="btn">Home</a>
    <a href="messages.html" class="btn">Messages</a>
    <a href="myads.html" class="btn">My Ads</a>
    <a href="post.html" class="btn">Post Ad</a>
    <a id="userAuth" href="login.html" class="btn">Login</a>
    <button id="logout-btn" class="btn logout-btn" style="display:none;">Logout</button>
</div>

<!-- Header Section -->
<header class="header">
    <div class="container">
        <h1>My Marketplace</h1>
        <div class="lang-buttons">
            <span id="lang-en">English</span>
            <span id="lang-fr">Français</span>
            <span id="lang-es">Español</span>
            <span id="lang-ar">العربية</span>
        </div>
    </div>
</header>

<!-- Hero Section with Search -->
<section class="hero">
    <div class="hero-content">
        <h2>Find anything in your city</h2>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="What are you looking for?">
            <input type="text" id="locationInput" placeholder="City or Neighborhood">
            <button onclick="applyFilters()" class="btn-search">Search</button>
        </div>
    </div>
</section>

<!-- Categories Section -->
<section class="categories-section container">
    <h3>Browse Categories</h3>
    <div class="category-grid" id="categoryGrid">
        <!-- Categories will be dynamically inserted here -->
    </div>
</section>

<!-- Main Content Section -->
<section class="main-content container">
    <div class="section-header">
        <h3>Latest Ads</h3>
        <button onclick="resetFilters()" class="btn-link">View All</button>
    </div>
    <div id="listings" class="grid"></div>
    <p id="no-items-message" style="display:none; text-align:center;">No items found.</p>
</section>

<!-- Footer Section -->
<footer>
    <div id="footer" class="container">
        <p><a href="terms.html">Terms</a></p>
        <p><a href="safety.html">Safety</a></p>
        <p><a href="privacy.html">Privacy</a></p>
    </div>
</footer>

<script>
// Fetch and display categories
function fetchCategories() {
    const categories = [
        { name: 'Real Estate', icon: '🏠' },
        { name: 'Cars', icon: '🚗' },
        { name: 'Furniture', icon: '🛋️' },
        { name: 'Electronics', icon: '📱' },
        { name: 'Fashion', icon: '👗' },
        { name: 'Pets', icon: '🐶' },
        { name: 'Books', icon: '📚' }
    ];

    const categoryGrid = document.getElementById('categoryGrid');
    categoryGrid.innerHTML = '';  // Clear previous content
    categories.forEach(category => {
        const categoryCard = document.createElement('div');
        categoryCard.classList.add('cat-card');
        categoryCard.innerHTML = `
            <span class="icon">${category.icon}</span>
            <p>${category.name}</p>
        `;
        categoryCard.onclick = function() {
            filterByCategory(category.name);
        };
        categoryGrid.appendChild(categoryCard);
    });
}

// Placeholder function for category filtering
function filterByCategory(category) {
    console.log('Filtering by category:', category);
}

// On page load, display categories and check login status
window.onload = function() {
    fetchCategories();    // Fetch and display categories
    checkLoginStatus();   // Check login status
};
</script>

<script src="main.js"></script>
<script src="storage.js"></script>

</body>
</html>
