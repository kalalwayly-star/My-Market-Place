<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Marketplace | Find Anything</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <h1 id="myTitle">My Marketplace</h1>

            <!-- Language Switch Buttons -->
            <div class="lang-buttons">
                <button id="lang-en">English</button>
                <button id="lang-fr">Français</button>
                <button id="lang-es">Español</button>
                <button id="lang-ar">العربية</button>
            </div>

            <div class="nav">
                <a href="index.html" class="btn text" id="home">Home</a>
                <a href="messages.html" class="btn text" id="nav_messages">Messages</a>
                <a href="myads.html" class="btn secondary" id="myAds">My Ads</a>
                <a href="post.html" class="btn primary" id="postAd">Post Ad</a>
                <span id="userAuth">
                    <a href="login.html" class="btn" id="nav_login">Login</a>
                </span>
                <button onclick="logout()" class="btn logout-btn" id="nav_logout">Logout</button>
            </div>
           <!-- Furniture -->
<div class="cat-card" onclick="filterByCategory('Furniture')">
    <span class="icon">🛋️</span>
    <p id="cat_furniture" data-i18n="cat_furniture">Furniture</p>
</div>

<!-- Jobs -->
<div class="cat-card" onclick="filterByCategory('Jobs')">
    <span class="icon">💼</span>
    <p id="cat_jobs" data-i18n="cat_jobs">Jobs</p>
</div>

<!-- Fashion -->
<div class="cat-card" onclick="filterByCategory('Fashion')">
    <span class="icon">👕</span>
    <p id="cat_fashion" data-i18n="cat_fashion">Fashion</p>
</div>

<!-- Pets -->
<div class="cat-card" onclick="filterByCategory('Pets')">
    <span class="icon">🐾</span>
    <p id="cat_pets" data-i18n="cat_pets">Pets</p>
</div>

<!-- Sports & Outdoors -->
<div class="cat-card" onclick="filterByCategory('Sports')">
    <span class="icon">🏀</span>
    <p id="cat_sports" data-i18n="cat_sports">Sports</p>
</div>

<!-- Books & Hobbies -->
<div class="cat-card" onclick="filterByCategory('Books')">
    <span class="icon">📚</span>
    <p id="cat_books" data-i18n="cat_books">Books</p>
</div>

<!-- Home Appliances -->
<div class="cat-card" onclick="filterByCategory('Appliances')">
    <span class="icon">🍳</span>
    <p id="cat_appliances" data-i18n="cat_appliances">Appliances</p>
</div>

<!-- Toys & Games -->
<div class="cat-card" onclick="filterByCategory('Toys')">
    <span class="icon">🧸</span>
    <p id="cat_toys" data-i18n="cat_toys">Toys</p>
</div>

        </div>
    </header>

    <section class="hero">
       <div class="hero-content">
           <h2 id="hero_title">Find anything in your city</h2>
           <div class="search-container">
               <!-- placeholder translation requires extra JS logic, but we'll stick to text for now -->
               <input type="text" id="search" placeholder="What are you looking for?">
               <input type="text" id="filterLocation" placeholder="City or Neighborhood">
               <button onclick="applyFilters()" class="btn-search" id="btn_search">Search</button>
           </div>
       </div>
    </section>

    <section class="categories-section">
       <h3 id="cat_header">Browse by Category</h3>
       <div class="category-grid">
           <!-- Added data-i18n to category text -->
           <div class="cat-card" onclick="filterByCategory('Cars & Trucks')">
               <span class="icon">🚗</span>
               <p data-i18n="cat_vehicles">Vehicles</p>
           </div>
           <div class="cat-card" onclick="filterByCategory('Real Estate')">
               <span class="icon">🏠</span>
               <p data-i18n="cat_realestate">Real Estate</p>
           </div>
           <!-- ... repeat for other categories ... -->
       </div>
    </section>

    <section class="main-content container">
       <div class="section-header">
           <h3 id="viewTitle">Recent Listings</h3>
           <button onclick="resetFilters()" class="btn-link" id="btn_view_all">View All</button>
       </div>
       <div id="listings" class="grid"></div>
    </section>

    <footer>
        <div id="footer">
            <p><a id="footer_terms" href="terms.html">Terms of Service</a></p>
            <p><a id="footer_safety" href="safety.html">Safety Tips</a></p>
            <p><a id="footer_privacy_header" href="privacy.html">Privacy Policy</a></p>
        </div>
    </footer>

    <!-- Scripts - Languages should be LAST to ensure it finds all elements -->
    <script src="storage.js"></script>
    <script src="main.js"></script>
    <script src="languages.js"></script>

</body>
</html>
