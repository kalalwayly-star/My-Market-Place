<script>
// 1. PayPal Logic
function togglePayPal(checkbox) {
    const paypalContainer = document.getElementById('paypal-button-container');
    const postBtn = document.getElementById('postBtn');
    
    if (checkbox.checked) {
        paypalContainer.style.display = 'block';
        if (postBtn) postBtn.style.display = 'none'; 
        
        if (paypalContainer.innerHTML === "") {
            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: '4.99' } }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Payment Complete!');
                        // Trigger the save function inside post.js
                        if (window.finalizeAd) window.finalizeAd(true);
                    });
                }
            }).render('#paypal-button-container');
        }
    } else {
        paypalContainer.style.display = 'none';
        if (postBtn) postBtn.style.display = 'block';
    }
}
</script>

<!-- 2. SCRIPTS ORDER -->
<script src="languages.js"></script> 
<!-- The 'type=module' is what allows Firebase to work -->
<script type="module" src="post.js"></script>
</body>
</html>
