<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Post Ad | Marketplace</title>
   <link rel="stylesheet" href="style.css">
   <!-- PayPal SDK -->
   <script src="https://www.paypal.com/sdk/js?client-id=AR_Wf3aXLq7GxACeo57SjDfghIrCso96DnHoZiMpLnKUsAaePgUoQyVKMbVt8B-RNMiVoPLCSXctDk6I&components=buttons"></script>
</head>
<body>
   <header class="header">
       <div class="container">
           <h1 id="myTitle">My Marketplace</h1>
           <div class="nav"><a href="index.html" class="btn text" id="home">Home</a></div>
       </div>
   </header>

   <div class="form-wrapper">
       <div class="form-card">
           <h2 id="post_ad_header">Post a New Listing</h2>
          
           <!-- CATEGORY SELECTOR -->
           <div class="input-group">
               <label id="label_category">Category</label>
               <select id="postCategory" required onchange="handleCategoryChange()">
                   <option value="" id="select_category">Choose Category</option>
                   <option value="Real Estate" id="cat_realestate">Real Estate</option>
                   <option value="Cars & Trucks" id="cat_cars_trucks">Cars and Trucks</option>
                   <option value="Furniture" id="cat_furniture">Furniture</option>
                   <option value="Jobs" id="cat_jobs">Jobs</option>
                   <option value="Fashion" id="cat_fashion">Fashion</option>
                   <option value="Pets" id="cat_pets">Pets</option>
                   <option value="Sports" id="cat_sports">Sports</option>
                   <option value="Books" id="cat_books">Books</option>
                   <option value="Appliances" id="cat_appliances">Appliances</option>
                   <option value="Toys" id="cat_toys">Toys</option>
               </select>
           </div>

           <!-- DYNAMIC SECTIONS (Hidden by default) -->
           
           <!-- Cars & Trucks Details -->
           <div id="section-Cars" class="category-details" style="display:none;">
               <div class="input-group">
                   <label id="label_make">Make/Model</label>
                   <input type="text" id="carMake" placeholder="e.g. Toyota Camry">
               </div>
               <div class="input-group">
                   <label id="label_year">Year</label>
                   <input type="number" id="carYear" placeholder="2024">
               </div>
               <div class="input-group">
                   <label id="label_km">Mileage (KM)</label>
                   <input type="number" id="carKM" placeholder="0">
               </div>
           </div>

           <!-- Real Estate Details -->
           <div id="section-RealEstate" class="category-details" style="display:none;">
               <div class="input-group">
                   <label id="label_bedrooms">Bedrooms</label>
                   <input type="number" id="reBeds" placeholder="2">
               </div>
               <div class="input-group">
                   <label id="label_bathrooms">Bathrooms</label>
                   <input type="number" id="reBaths" placeholder="1">
               </div>
           </div>

           <!-- Condition (Show for all except Jobs/Real Estate) -->
           <div id="conditionSection" style="display:none; margin-top:10px;">
               <label id="label_condition">Condition</label>
               <div class="condition-options">
                   <input type="radio" name="condition" value="New" id="cond_new">
                   <label for="cond_new" id="opt_new">New</label>
                   <input type="radio" name="condition" value="Used" id="cond_used">
                   <label for="cond_used" id="opt_used">Used</label>
               </div>
           </div>

           <!-- COMMON FIELDS -->
           <div id="commonFields" style="display:none; margin-top:20px;">
               <hr>
               <div class="input-group">
                   <label id="label_location">City/Location</label>
                   <input type="text" id="adLocation" required>
               </div>
               <div class="input-group">
                   <label id="label_title">Ad Title</label>
                   <input type="text" id="adTitle" required>
               </div>
               <div class="input-group">
                   <label id="label_price">Price ($)</label>
                   <input type="number" id="adPrice" required>
               </div>
               <div class="input-group">
                   <label id="label_description">Description</label>
                   <textarea id="adDesc" rows="4"></textarea>
               </div>

               <!-- FEATURE OPTION -->
               <div class="form-group" style="background: #fff8e1; padding: 10px; border-radius: 5px; margin: 15px 0;">
                   <label for="isFeatured" style="cursor:pointer; font-weight: bold;">
                       <input type="checkbox" id="isFeatured" onchange="togglePayPal(this)">
                       ✨ Feature this ad for only $4.99
                   </label>
               </div>

               <!-- PayPal Button (Hidden until checkbox clicked) -->
               <div id="paypal-button-container" style="display:none;"></div>
               
               <button id="postBtn" onclick="saveNewAd(event)" class="btn-primary-large">Post Ad Now</button>
           </div>
       </div>
   </div>

   <script src="storage.js"></script>
   <script src="main.js"></script>
   <script src="languages.js"></script>

   <script>
       function handleCategoryChange() {
           const categorySelect = document.getElementById('postCategory');
           const val = categorySelect.value;
           
           // Hide all extra sections first
           document.querySelectorAll('.category-details').forEach(s => s.style.display = 'none');
           document.getElementById('conditionSection').style.display = 'none';
           
           if(val === "") {
               document.getElementById('commonFields').style.display = 'none';
               return;
           }

           document.getElementById('commonFields').style.display = 'block';

           // Show specific fields
           if(val === "Cars & Trucks") {
               document.getElementById('section-Cars').style.display = 'block';
               document.getElementById('conditionSection').style.display = 'block';
           } else if(val === "Real Estate") {
               document.getElementById('section-RealEstate').style.display = 'block';
           } else if(val !== "Jobs") {
               document.getElementById('conditionSection').style.display = 'block';
           }
       }

       function togglePayPal(checkbox) {
           const container = document.getElementById('paypal-button-container');
           const postBtn = document.getElementById('postBtn');
           
           if (checkbox.checked) {
               container.style.display = 'block';
               postBtn.style.display = 'none'; // Hide post button until paid
               renderPayPal();
           } else {
               container.style.display = 'none';
               postBtn.style.display = 'block';
           }
       }

       function renderPayPal() {
           // Only render if container is empty to avoid double buttons
           if (document.getElementById('paypal-button-container').innerHTML !== "") return;

           paypal.Buttons({
               createOrder: (data, actions) => {
                   return actions.order.create({
                       purchase_units: [{ amount: { value: '4.99' } }]
                   });
               },
               onApprove: (data, actions) => {
                   return actions.order.capture().then(details => {
                       alert('Payment successful! You can now post your featured ad.');
                       document.getElementById('postBtn').style.display = 'block';
                       document.getElementById('paypal-button-container').style.display = 'none';
                   });
               }
           }).render('#paypal-button-container');
       }
   </script>
</body>
</html>
