<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="post_page_title">Post Ad | Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AR_Wf3aXLq7GxACeo57SjDfghIrCso96DnHoZiMpLnKUsAaePgUoQyVKMbVt8B-RNMiVoPLCSXctDk6I&components=buttons"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 data-i18n="myTitle">My Marketplace</h1>
            <div class="nav">
                <a href="index.html" class="btn text" data-i18n="home">Home</a>
            </div>
        </div>
    </header>

    <div class="form-wrapper">
        <div class="form-card">
            <h2 data-i18n="post_ad_header">Post a New Listing</h2>
            <form id="postForm" enctype="multipart/form-data">

                <!-- CATEGORY -->
                <div class="input-group">
                    <label data-i18n="label_category">Category</label>
                    <select id="postCategory" required>
                        <option value="" data-i18n="select_category">Choose Category</option>
                        <option value="Real Estate" data-i18n="cat_realestate">Real Estate</option>
                        <option value="Cars & Trucks" data-i18n="cat_cars_trucks">Cars and Trucks</option>
                        <option value="Furniture" data-i18n="cat_furniture">Furniture</option>
                        <!-- More options as needed -->
                    </select>
                </div>

                <!-- PHOTO -->
                <div class="form-section">
                    <h3 data-i18n="photo_header">Photos (Max 10)</h3>
                    <div class="upload-container">
                        <label for="photoInput" class="upload-box">
                            <div class="icon">📸</div>
                            <span data-i18n="click_to_add">Click to add photos</span>
                            <input type="file" id="photoInput" accept="image/*" multiple hidden>
                        </label>
                        <div id="galleryPreview" class="gallery-grid"></div>
                    </div>
                </div>

                <!-- COMMON FIELDS -->
               <!-- Common Fields: Title, Price, Description -->
<div id="commonFields">
    <label for="adTitle">Title:</label>
    <input type="text" id="adTitle" required />

    <label for="adPrice">Price:</label>
    <input type="number" id="adPrice" required />

    <label for="adLocation">Location:</label>
    <input type="text" id="adLocation" required />

    <label for="adDesc">Description:</label>
    <textarea id="adDesc" required></textarea>
</div>

<!-- Car Specific Fields (Only shown for "Cars & Trucks" category) -->
<div id="carFields" style="display: none;">
    <label for="carMake">Car Make:</label>
    <input type="text" id="carMake" />

    <label for="carModel">Car Model:</label>
    <input type="text" id="carModel" />

    <label for="carYear">Car Year:</label>
    <input type="number" id="carYear" />

    <label for="carMileage">Mileage (km):</label>
    <input type="number" id="carMileage" />

    <label for="carFuelType">Fuel Type:</label>
    <select id="carFuelType">
        <option value="Gasoline">Gasoline</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Electric">Electric</option>
    </select>
</div>

<!-- Condition Fields (For applicable categories) -->
<div id="conditionFields">
    <label for="condition">Condition:</label>
    <input type="radio" name="condition" value="New"> New
    <input type="radio" name="condition" value="Used"> Used
    <input type="radio" name="condition" value="Refurbished"> Refurbished
</div>
                    <div class="form-group feature-box">
                        <label>
                            <input type="checkbox" id="isFeatured">
                            <span data-i18n="label_featured">✨ Feature this ad for $4.99 to stay at top (5 days)</span>
                        </label>
                    </div>

                    <div id="paypal-button-container" style="display:none;"></div>
                </div>

                <button type="submit" id="postBtn" class="btn primary" data-i18n="post_btn">Post Ad Now</button>
            </form>
        </div>
    </div>

    <!-- CORE SCRIPTS -->
    <script src="languages.js"></script>
    <script type="module" src="post.js"></script>
</body>
</html>
