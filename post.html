<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="postAd">Post an Ad</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID_HERE&components=buttons"></script> <!-- PayPal SDK -->
</head>
<body>

<header class="header">
    <div class="container">
        <h1 data-i18n="post_ad_title">Post Your Ad</h1>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="myads.html" class="btn secondary" data-i18n="myAds">My Ads</a>
            <button id="logout-btn" class="btn logout-btn" data-i18n="nav_logout">Logout</button>
        </div>
    </div>
</header>

<section class="main-content container">
    <h2 data-i18n="fill_out_ad_form">Fill out the form to post your ad</h2>

    <form id="post-ad-form" onsubmit="submitAd(event)">
        <div>
            <label for="ad-title" data-i18n="ad_title">Ad Title:</label>
            <input type="text" id="ad-title" required placeholder="Enter title here" data-i18n-placeholder="title_placeholder">
        </div>
        <div>
            <label for="ad-description" data-i18n="ad_description">Description:</label>
            <textarea id="ad-description" required placeholder="Enter description here" data-i18n-placeholder="description_placeholder"></textarea>
        </div>
        <div>
            <label for="ad-category" data-i18n="ad_category">Category:</label>
            <select id="ad-category" required>
                <option value="Real Estate" data-i18n="cat_realestate">Real Estate</option>
                <option value="Cars & Trucks" data-i18n="cat_cars_trucks">Cars</option>
                <option value="Furniture" data-i18n="cat_furniture">Furniture</option>
                <option value="Jobs" data-i18n="cat_jobs">Jobs</option>
                <option value="Fashion" data-i18n="cat_fashion">Fashion</option>
                <option value="Electronics" data-i18n="cat_electronics">Electronics</option>
                <!-- Add more categories as needed -->
            </select>
        </div>
        <div>
            <label for="ad-price" data-i18n="ad_price">Price:</label>
            <input type="number" id="ad-price" required placeholder="Enter price here" data-i18n-placeholder="price_placeholder">
        </div>
        <div>
            <label for="ad-image" data-i18n="ad_image">Ad Image:</label>
            <input type="file" id="ad-image" accept="image/*">
        </div>
        
        <!-- PayPal button for payment -->
        <div id="paypal-button-container"></div>
        
        <button type="submit" class="btn primary" data-i18n="submit_ad">Submit Ad</button>
    </form>
</section>

<footer>
    <div id="footer" class="container">
        <p><a href="terms.html" data-i18n="footer_terms">Terms</a></p>
        <p><a href="privacy.html" data-i18n="footer_privacy_header">Privacy</a></p>
    </div>
</footer>

<script src="post.js"></script>

<script>
// PayPal Button Integration
paypal.Buttons({
    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: document.getElementById('ad-price').value || '0.00' // Dynamic amount based on ad price
                }
            }]
        });
    },
    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            alert('Payment completed for ' + details.payer.name.given_name);
            document.getElementById('post-ad-form').submit(); // Submit the form once payment is successful
        });
    }
}).render('#paypal-button-container'); // Render PayPal button
</script>

</body>
</html>
