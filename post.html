<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="postAd">Post Ad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 data-i18n="postAdHeader">Post your ad</h1>
    </header>
    
    <form id="post-ad-form" onsubmit="submitAd(event)">
        <div class="form-field">
            <label for="ad-category" data-i18n="category">Category</label>
            <select id="ad-category" name="category" required>
                <option value="" data-i18n="selectCategory">Select a category</option>
                <option value="Real Estate" data-i18n="real_estate">🏠 Real Estate</option>
                <option value="Cars" data-i18n="cars">🚗 Cars</option>
                <option value="Furniture" data-i18n="furniture">🛋️ Furniture</option>
                <option value="Auto Accessories" data-i18n="auto_accessories">🛠️ Auto Accessories</option>
                <option value="Electronics" data-i18n="electronics">📱 Electronics</option>
                <option value="Fashion" data-i18n="fashion">👗 Fashion</option>
                <option value="Pets" data-i18n="pets">🐶 Pets</option>
                <option value="Sports" data-i18n="sports">⚽ Sports</option>
                <option value="Books" data-i18n="books">📚 Books</option>
                <option value="Appliances" data-i18n="appliances">🔌 Appliances</option>
                <option value="Toys" data-i18n="toys">🧸 Toys</option>
                <option value="Services" data-i18n="services">💼 Services</option>
                <option value="Garden" data-i18n="garden">🌱 Garden</option>
                <option value="Health" data-i18n="health">💊 Health</option>
                <option value="Baby" data-i18n="baby">👶 Baby</option>
            </select>
        </div>

        <!-- Image Upload -->
        <div class="form-field">
            <label for="ad-image" data-i18n="imageUpload">Upload Image</label>
            <input type="file" id="ad-image" name="ad-image" multiple accept="image/*">
            <div id="image-previews" class="image-previews"></div>  <!-- Container for image previews -->
        </div>

        <!-- Title -->
        <div class="form-field">
            <label for="ad-title" data-i18n="title">Title</label>
            <input type="text" id="ad-title" name="title" required>
        </div>

        <!-- Location -->
        <div class="form-field">
            <label for="ad-location" data-i18n="location">Location</label>
            <input type="text" id="ad-location" name="location" required>
        </div>

        <!-- Price -->
        <div class="form-field">
            <label for="ad-price" data-i18n="price">Price ($)</label>
            <input type="number" id="ad-price" name="price" required>
        </div>

        <!-- Description -->
        <div class="form-field">
            <label for="ad-description" data-i18n="description">Description</label>
            <textarea id="ad-description" name="description" rows="5" required></textarea>
        </div>

        <!-- Condition (depends on category) -->
        <div class="form-field" id="condition-field">
            <label for="ad-condition" data-i18n="condition">Condition</label>
            <select id="ad-condition" name="condition">
                <option value="new" data-i18n="new">New</option>
                <option value="used" data-i18n="used">Used</option>
            </select>
        </div>

        <!-- Post Ad Button -->
        <button type="submit" id="post-ad-btn" class="btn-primary" data-i18n="postAdButton">Post Ad Now</button>
    </form>

    <script src="post.js"></script>  <!-- For custom JS files using modules -->
</body>
</html>
