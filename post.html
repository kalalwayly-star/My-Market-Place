<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="postAd">Post Ad</title>
    <link rel="stylesheet" href="style.css">
<script 
  src="https://www.paypal.com/sdk/js?client-id=BAALjbSyVpTywXL1shHMGKfQdSGCjgfLPchku1LlvChOCvK1gNTdU8nZrp9ApWOBqKZuIbDXVecCGOSqjE&components=hosted-buttons&disable-funding=venmo&currency=CAD">
</script>
</head>
<body>
    <header class="header">
        <h1 data-i18n="postAdHeader">Post your ad</h1>
    </header>
    
<form id="post-ad-form" onsubmit="submitAd(event)">
        <div class="form-field">
            <label for="ad-category" data-i18n="category">Category</label>
            <select id="ad-category" name="category" required>
                <option value="">Select a category</option>
                <option value="Cars & Trucks">Cars & Trucks</option>
                <option value="Auto Accessories">Auto Accessories</option>
                <option value="Real Estate">Real Estate</option>
                <option value="Furniture">Furniture</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Pets">Pets</option>
                <option value="Sports">Sports</option>
                <option value="Books">Books</option>
                <option value="Appliances">Appliances</option>
                <option value="Toys">Toys</option>
                <option value="Services">Services</option>
                <option value="Garden">Garden</option>
                <option value="Health">Health</option>
                <option value="Baby">Baby</option>
            </select>
        </div>

        <!-- Image Upload -->
        <div class="form-field">
            <label for="ad-image" data-i18n="imageUpload">Upload Image</label>
            <input type="file" id="ad-image" name="ad-image" multiple accept="image/*">
    <div id="image-previews" class="image-previews"></div>  <!-- Container for image previews -->
        </div>
    </div>

        <!-- Title -->
        <div class="form-field">
            <label for="ad-title" data-i18n="title">Title</label>
            <input type="text" id="ad-title" name="title" required>
        </div>

        <!-- Location -->
        <div class="form-field">
            <label for="ad-location" data-i18n="location">Location</label>
            <input type="text" id="ad-location" name="location" required>
        </div>

        <!-- Price -->
        <div class="form-field">
            <label for="ad-price" data-i18n="price">Price ($)</label>
            <input type="number" id="ad-price" name="price" required>
        </div>

        <!-- Description -->
        <div class="form-field">
            <label for="ad-description" data-i18n="description">Description</label>
            <textarea id="ad-description" name="description" rows="5" required></textarea>
        </div>

        <!-- Condition (depends on category) -->
        <div class="form-field" id="condition-field">
            <label for="ad-condition" data-i18n="condition">Condition</label>
            <select id="ad-condition" name="condition">
                <option value="new" data-i18n="new">New</option>
                <option value="used" data-i18n="used">Used</option>
            </select>
        </div>

        <!-- Car-specific Fields (only for "Cars & Trucks") -->
        <div id="car-info" style="display:none;">
           <div class="car-info-section">
    <label for="car-year">Select Year:</label>
    <select id="car-year" name="car-year">
        <!-- Year options will be populated dynamically -->
    </select>

    <label for="car-make">Select Make:</label>
    <select id="car-make" name="car-make">
        <option value="">Select a Make</option>
        <!-- Make options will be populated dynamically -->
    </select>

    <label for="car-model">Select Model:</label>
    <select id="car-model" name="car-model">
        <option value="">Select a Model</option>
        <!-- Model options will be populated dynamically -->
    </select>
</div>
            <div class="form-field">
                <label for="car-kms" data-i18n="kms">Kilometers</label>
                <input type="number" id="car-kms" name="kms">
            </div>
            <div class="form-field">
                <label for="car-fuel" data-i18n="fuel">Fuel Type</label>
                <select id="car-fuel" name="fuel">
                    <option value="Petrol" data-i18n="petrol">Petrol</option>
                    <option value="Diesel" data-i18n="diesel">Diesel</option>
                    <option value="Electric" data-i18n="electric">Electric</option>
                    <option value="Hybrid" data-i18n="hybrid">Hybrid</option>
                </select>
            </div>
        </div>

        <!-- PayPal Featured Options -->
        <div class="form-field">
            <!-- Featured Ad Section with Localization -->
<label for="featured" data-i18n="featured_label">Featured Ad:</label><br>

<input type="radio" id="isFeatured5Days" name="featured" value="5Days" data-i18n="feature_5days">
<label for="isFeatured5Days" data-i18n="feature_5days_label">$4.99 - Stay at top for 5 days</label><br>

<input type="radio" id="isFeatured10Days" name="featured" value="10Days" data-i18n="feature_10days">
<label for="isFeatured10Days" data-i18n="feature_10days_label">$8.99 - Stay at top for 10 days</label><br>

<input type="radio" id="isNotFeatured" name="featured" value="none" data-i18n="no_feature">
<label for="isNotFeatured" data-i18n="no_feature_label">Do not feature</label><br>

<!-- PayPal Button Container (Only visible when feature is selected) -->
<div id="paypal-button-container" style="display:none;"></div>
        </div>

        <!-- Post Ad Button -->
        <button type="submit" id="post-ad-btn" class="btn-primary" data-i18n="postAdButton">Post Ad Now</button>
    </form>

    <script src="post.js"></script>
</body>
</html>
