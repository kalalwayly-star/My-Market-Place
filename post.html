<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Post Ad | Marketplace</title>
   <link rel="stylesheet" href="style.css">
   <!-- PayPal SDK -->
   <script src="https://www.paypal.com/sdk/js?client-id=AR_Wf3aXLq7GxACeo57SjDfghIrCso96DnHoZiMpLnKUsAaePgUoQyVKMbVt8B-RNMiVoPLCSXctDk6I&components=buttons"></script>
</head>
<body>
   <header class="header">
       <div class="container">
           <h1>My Marketplace</h1>
           <div class="nav"><a href="index.html" class="btn text">Home</a></div>
       </div>
   </header>

   <div class="form-wrapper">
       <div class="form-card">
           <h2>Post a New Listing</h2>
          
           <!-- CATEGORY SELECTOR -->
           <div class="input-group">
               <!-- Category Dropdown -->
<label id="label_category">Category</label>
<select id="postCategory" required>
    <option value="" id="select_category">Choose Category</option>
    <option value="Real Estate" id="cat_realestate">Real Estate</option>
    <option value="Cars & Trucks" id="cat_cars_trucks">Cars and Trucks</option>
    <option value="Furniture" id="cat_furniture">Furniture</option>
    <option value="Jobs" id="cat_jobs">Jobs</option>
    <option value="Fashion" id="cat_fashion">Fashion</option>
    <option value="Pets" id="cat_pets">Pets</option>
    <option value="Sports" id="cat_sports">Sports</option>
    <option value="Books" id="cat_books">Books</option>
    <option value="Appliances" id="cat_appliances">Appliances</option>
    <option value="Toys" id="cat_toys">Toys</option>
</select>

<!-- Condition (New/Used) -->
<label id="label_condition">Condition</label>
<div class="condition-options">
    <input type="radio" name="condition" value="New" id="cond_new">
    <label for="cond_new" id="opt_new">New</label>
    
    <input type="radio" name="condition" value="Used" id="cond_used">
    <label for="cond_used" id="opt_used">Used</label>
</div>

           </div>

           <!-- Section: Photos -->
           <div class="form-section">
               <h3>Photos (At least 1 required, max 10)</h3>
               <div class="upload-container">
                   <label for="photoInput" class="upload-box">
                       <div class="icon">📸</div>
                       <span>Click to add photos</span>
                       <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotoUpload(event)" hidden>
                   </label>
                   <div id="galleryPreview" class="gallery-grid"></div>
               </div>
           </div>

           <!-- COMMON FIELDS -->
           <div id="commonFields" style="display:none; margin-top:20px;">
               <hr>
               <div class="input-group">
                   <label>City/Location (Required)</label>
                   <input type="text" id="adLocation" placeholder="e.g. Brandon, MB" required>
               </div>
               <div class="input-group">
                   <label>Ad Title</label>
                   <input type="text" id="adTitle" required>
               </div>
               <div class="input-group">
                   <label>Price ($)</label>
                   <input type="number" id="adPrice" required>
               </div>
               <div class="input-group">
                   <label>Description</label>
                   <textarea id="adDesc" rows="4"></textarea>
               </div>
               <div class="input-group">
                   <label>Image URL</label>
                   <input type="text" id="adImage" placeholder="https://...">
               </div>

               <!-- FEATURE OPTION -->
               <div class="form-group">
                   <label for="isFeatured">
                       <input type="checkbox" id="isFeatured">
                       ✨ Feature this ad for only $4.99 (Stay at the top!)
                   </label>
               </div>

               <!-- PayPal Button -->
               <div id="paypal-button-container" style="display:none; margin-top: 20px;"></div>
               <br><br>
               <button id="postBtn" onclick="saveNewAd(event)" class="btn-primary-large">Post Ad Now</button>
           </div>
       </div>
   </div>

   <script>
       // Category change handling
       function handleCategoryChange() {
           const mainCategorySelect = document.getElementById('mainCategory');
           if (!mainCategorySelect) return;

           const categoryValue = mainCategorySelect.value;
           const commonFields = document.getElementById('commonFields');
           const sections = document.querySelectorAll('.category-details');
           
           sections.forEach(sec => sec.style.display = 'none');
           
           if (categoryValue === "") {
               if (commonFields) commonFields.style.display = 'none';
               return;
           }
           
           if (commonFields) commonFields.style.display = 'block';

           let sectionId = "";
           if (categoryValue === "Cars & Trucks") sectionId = "section-Cars";
           if (categoryValue === "Real Estate") sectionId = "section-RealEstate";
           if (categoryValue === "Jewellery") sectionId = "section-Jewellery";
           if (categoryValue === "Electronics") sectionId = "section-Electronics";

           const targetSection = document.getElementById(sectionId);
           if (targetSection) targetSection.style.display = 'block';
       }

       // Photo Upload Logic
       async function handlePhotoUpload(event) {
           const gallery = document.getElementById('galleryPreview');
           if (!gallery) {
               console.error("galleryPreview element not found in HTML");
               return;
           }

           const files = Array.from(event.target.files);
           if (uploadedImages.length + files.length > 10) {
               alert("Maximum 10 photos allowed.");
               return;
           }

           for (const file of files) {
               const base64 = await compressImage(file);
               uploadedImages.push(base64);

               const div = document.createElement('div');
               div.style.cssText = "position:relative; display:inline-block; margin:5px;";
               div.innerHTML = `
                   <img src="${base64}" style="width:80px; height:80px; object-fit:cover; border-radius:5px;">
                   <button onclick="removeImg(event, '${base64}', this)" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:18px; height:18px; cursor:pointer;">×</button>
               `;
               gallery.appendChild(div);
           }
       }

       // Compress the image for upload
       function compressImage(file) {
           return new Promise((resolve) => {
               const reader = new FileReader();
               reader.readAsDataURL(file);
               reader.onload = (e) => {
                   const img = new Image();
                   img.src = e.target.result;
                   img.onload = () => {
                       const canvas = document.createElement('canvas');
                       let width = img.width;
                       let height = img.height;
                       const MAX = 800;
                       if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                       else if (height > MAX) { width *= MAX / height; height = MAX; }
                       canvas.width = width; canvas.height = height;
                       const ctx = canvas.getContext('2d');
                       ctx.drawImage(img, 0, 0, width, height);
                       resolve(canvas.toDataURL('image/jpeg', 0.7));
                   };
               };
           });
       }

       // Remove uploaded image
       function removeImg(e, data, btn) {
           e.preventDefault();
           uploadedImages = uploadedImages.filter(img => img !== data);
           btn.parentElement.remove();
       }

       // PayPal button rendering function
       function renderPayPalButton() {
           paypal.Buttons({
               createOrder: function(data, actions) {
                   return actions.order.create({
                       purchase_units: [{
                           amount: { value: '4.99' }
                       }]
                   });
               },
               onApprove: function(data, actions) {
                   return actions.order.capture().then(function(details) {
                       alert('Payment successful, ' + details.payer.name.given_name);
                       saveNewAd();  // Ensure this function posts the ad
                   });
               }
           }).render('#paypal-button-container');
       }

       // Save Ad Logic
       function saveNewAd(event) {
           if (event) event.preventDefault();

           if (!currentUser) {
               alert("Please login first.");
               window.location.href = "login.html";
               return;
           }

           const newAd = {
               id: Date.now(),
               userEmail: currentUser.email,
               category: document.getElementById('mainCategory').value,
               title: document.getElementById('adTitle').value,
               price: document.getElementById('adPrice').value,
               location: document.getElementById('adLocation').value,
               description: document.getElementById('adDesc').value,
               image: uploadedImages.length > 0 ? uploadedImages : [document.getElementById('adImage').value || 'https://placeholder.com'],
               status: "Active",
               isFeatured: document.getElementById('isFeatured').checked,
               date: new Date().toLocaleDateString()
           };

           const ads = JSON.parse(localStorage.getItem("ads") || "[]");
           ads.push(newAd);
           localStorage.setItem("ads", JSON.stringify(ads));

           alert("Ad Posted Successfully!");
           window.location.href = "index.html";
       }

       // Add event listener for photo input
       document.addEventListener("DOMContentLoaded", () => {
           const input = document.getElementById("photoInput");
           if (input) input.addEventListener("change", handlePhotoUpload);
       });
   </script>

   <footer>
       <p>© 2026 Classified-Site</p>
       <ul>
           <li><a href="terms.html">Terms of Service</a></li>
           <li><a href="privacy.html">Privacy Policy</a></li>
           <li><a href="safety.html">Safety Tips</a></li>
       </ul>
   </footer>

   <script src="storage.js"></script>
   <script src="post.js"></script>
</body>
</html>
