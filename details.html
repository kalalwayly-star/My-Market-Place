<body>

<header class="header">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
        <h1 data-i18n="header_title">My Marketplace</h1>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="back_home">Back to Browse</a>
            <a href="myads.html" class="btn text" data-i18n="myAds">My Ads</a>
        </div>
    </div>
</header>

<main class="container">
    <div class="detail-grid">

        <!-- Main Content -->
        <div class="content-main">
            <div id="adImageContainer" class="main-image"></div>

            <div class="description-section">
                <h2 data-i18n="label_description">Description</h2>
                <p id="adDesc" style="white-space: pre-wrap;">Loading description...</p>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="content-sidebar">
            <div class="price-card">
                <h1 id="adTitle">Loading Title...</h1>
                <p id="adCategory"></p>
                <div class="price-tag" id="adPrice">$0</div>
                <p>📍 <span id="adLocation">Unknown</span></p>
                <p>📧 <span id="sellerEmail">Unknown Seller</span></p>

                <hr>

                <h3 data-i18n="contact_seller">Contact Seller</h3>

                <textarea
                    id="messageText"
                    rows="4"
                    placeholder="Hi, is this still available?"
                    data-i18n-placeholder="message_placeholder"></textarea>

                <button
                    onclick="sendMessage()"
                    class="btn-primary-large"
                    data-i18n="send_message">
                    Send Message
                </button>

                <button id="reportBtn" onclick="showReportModal()" data-i18n="report_ad">
                    Report this Ad
                </button>
            </div>
        </div>

    </div>
</main>

<!-- Report Modal -->
<div id="reportModal">
    <h3 data-i18n="report_ad">Report Ad</h3>

    <select id="reportReason" style="width:100%; padding:10px; margin:15px 0;">
        <option value="scam" data-i18n="report_scam">Scam</option>
        <option value="illegal" data-i18n="report_illegal">Illegal Item</option>
        <option value="fake" data-i18n="report_fake">Fake Listing</option>
        <option value="spam" data-i18n="report_spam">Spam</option>
    </select>

    <div style="display:flex; gap:10px;">
        <button onclick="submitReport()" style="flex:1; background:#28a745; color:white; border:none; padding:10px; border-radius:5px;" data-i18n="submit_report">
            Submit
        </button>

        <button onclick="closeModal()" style="flex:1; background:#ccc; border:none; padding:10px; border-radius:5px;" data-i18n="cancel">
            Cancel
        </button>
    </div>
</div>

<footer>
    <div class="container">

        <ul>

            <li><a href="safety.html" data-i18n="footer_safety">Safety Tips</a></li>
        </ul>
    </div>
</footer>

<script src="languages.js"></script>
<script src="storage.js"></script>
<script src="details.js"></script>
<script src="main.js"></script>

</body>
