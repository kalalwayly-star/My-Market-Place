<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Language Switcher | My Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1 data-i18n="greeting">Welcome</h1>

        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn primary" data-i18n="postAd">Post Ad</a>
        </div>
    </div>
</header>

<section class="container main-content">
    <div class="section-header">
        <h2 data-i18n="myAds">My Ads</h2>
        <p id="userGreeting"></p>
    </div>

    <div id="adsGrid" class="ads-grid">
        <p class="loading" data-i18n="noAds">No ads available</p>
    </div>
</section>

<!-- Language Selector -->
<div style="margin: 20px;">
    <label for="languageSwitcher" data-i18n="choose_language">Choose Language:</label>
    <select id="languageSwitcher">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
    </select>
</div>

<!-- Scripts -->
<script src="languages.js"></script>

</body>
</html>
