<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Language Switcher | My Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1 data-i18n="greeting">Welcome</h1>

        <div class="nav" id="userAuth">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn primary" data-i18n="postAd">Post Ad</a>
        </div>
<div class="lang-text">
    <span onclick="setLanguage('en')">English</span>
    <span onclick="setLanguage('fr')">Français</span>
    <span onclick="setLanguage('es')">Español</span>
    <span onclick="setLanguage('ar')">العربية</span>
</div>
    </div>
</header>

<section class="container main-content">
    <div class="section-header">
        <h2 data-i18n="myAds">My Ads</h2>
        <p id="userGreeting"></p>
    </div>

    <div id="adsGrid" class="ads-grid">
        <p class="loading" data-i18n="noAds">No ads available</p>
    </div>
</section>


<!-- Scripts -->
<script src="languages.js"></script>

</body>
</html>
