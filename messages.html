<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="messages_title">My Messages | Marketplace</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <h1 data-i18n="messages_title">My Messages</h1>
        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
        </div>
    </header>

    <!-- Main Content Section -->
    <div class="container">
        
        <!-- Search Bar Section -->
        <div class="search-messages-container" style="margin-bottom: 20px;">
            <input 
                type="text" 
                id="msgSearch" 
                placeholder="Search Messages"
                data-i18n-placeholder="search_messages"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        
        <!-- Tabs Section (Received / Sent) -->
        <div class="message-tabs" style="margin-bottom: 20px;">
            <button onclick="changeTab('received')" id="btnReceived" class="btn text active" data-i18n="received">
                <i class="fas fa-inbox"></i> Received
            </button>
            <button onclick="changeTab('sent')" id="btnSent" class="btn text" data-i18n="sent">
                <i class="fas fa-paper-plane"></i> Sent
            </button>
        </div>

        <!-- Messages List Section -->
        <div id="messageList" class="message-grid">
            <!-- Dynamically populated messages will go here -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="main.js"></script>
    <script src="languages.js"></script>
    <script src="storage.js"></script>
    <script type="module" src="messages.js"></script>

    <script>
        let currentTab = 'received';
        const STORAGE_KEY = "marketplace_messages";

        // Render messages based on search/filter text and tab
        function renderMessages(filterText = "") {
            const allMessages = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const container = document.getElementById("messageList");

            if (!currentUser || !container) return;

            // 1. FILTER messages: Show the correct tab and exclude deleted ones
            let filtered = allMessages.filter(m => {
                if (currentTab === 'received') {
                    return m.receiverEmail === currentUser.email && m.deletedByReceiver !== true;
                } else {
                    return m.senderEmail === currentUser.email && m.deletedBySender !== true;
                }
            });

            // 2. SEARCH: Filter messages by search query
            if (filterText) {
                const query = filterText.toLowerCase();
                filtered = filtered.filter(m => 
                    (m.adTitle && m.adTitle.toLowerCase().includes(query)) ||
                    (m.text && m.text.toLowerCase().includes(query))
                );
            }

            // 3. DISPLAY messages
            if (filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:20px;">No messages found.</p>`;
            } else {
                container.innerHTML = filtered.map(m => createMessageCard(m)).join('');
            }
        }

        // Create a single message card's HTML structure
        function createMessageCard(m) {
            const person = (currentTab === 'received' ? m.senderEmail : m.receiverEmail) || "User";
            const id = m.id;
            return `
                <div class="message-card" style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: white;">
                    <h4 style="margin:0;">Re: ${m.adTitle || "Marketplace Ad"}</h4>
                    <p style="font-size: 0.85em; color: #555; margin: 5px 0;">
                        <strong>${currentTab === 'received' ? 'From' : 'To'}:</strong>
                        ${currentTab === 'received' ? (m.senderEmail || "Reply") : (m.receiverEmail || "Reply")}
                    </p>
                    <p style="background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 10px 0; color: #333;">${m.text || ""}</p>
                    <div style="display: flex; gap: 15px; align-items: center; margin-top: 10px;">
                        <span style="font-size: 0.75em; color: #888;">${m.date || ""}</span>
                        <button onclick="deleteMessage('${m.id}')" style="color: #d9534f; cursor: pointer; background: none; border: none; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                            <i class="fas fa-trash-alt"></i> Delete
                        </button>
                        ${(currentTab || 'received') === 'received' ? `
                        <button onclick="toggleReply('${m.id}')" style="color: #007bff; cursor: pointer; background: none; border: none; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                            <i class="fas fa-reply"></i> Reply
                        </button>` : ''}
                    </div>
                    <div id="reply-box-${m.id}" style="display: none; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
                        <textarea id="reply-text-${m.id}" placeholder="Type your answer..." style="width: 100%; height: 60px; border-radius: 5px; border: 1px solid #ccc; padding: 8px; margin-bottom: 5px;"></textarea>
                        <button onclick="sendReply('${m.id}')" style="background: #28a745; color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Send</button>
                    </div>
                </div>
            `;
        }

        // Delete message from local storage
        function deleteMessage(id) {
            const STORAGE_KEY = "marketplace_messages"; 
            if (!confirm("Delete this message?")) return;

            let all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));

            const updated = all.map(m => {
                if (String(m.id) === String(id)) {
                    if (currentTab === 'received') {
                        m.deletedByReceiver = true; 
                    } else {
                        m.deletedBySender = true;
                    }
                }
                return m;
            });

            const cleaned = updated.filter(m => !(m.deletedBySender && m.deletedByReceiver));

            localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
            renderMessages();
        }

        // Toggle reply box visibility
        function toggleReply(id) {
            const box = document.getElementById(`reply-box-${id}`);
            if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        // Send a reply to the original message
        function sendReply(originalMsgId) {
            const textInput = document.getElementById(`reply-text-${originalMsgId}`);
            const val = textInput.value.trim();
            if (!val) return alert("Please enter text.");

            const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            const old = all.find(m => String(m.id) === String(originalMsgId));
            const user = JSON.parse(localStorage.getItem("currentUser"));

            const reply = {
                id: Date.now(),
                adTitle: old.adTitle || "Reply",
                senderEmail: user.email,
                receiverEmail: old.senderEmail,
                text: val,
                date: new Date().toLocaleString()
            };

            all.push(reply);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
            alert("Reply Sent!");
            renderMessages();
        }

        // Change tab (received or sent)
        function changeTab(tab) {
            currentTab = tab;
            document.getElementById("btnReceived").classList.toggle("active", tab === 'received');
            document.getElementById("btnSent").classList.toggle("active", tab === 'sent');
            renderMessages();
        }

        // Initial load of messages on page load
        window.onload = renderMessages;
    </script>

    <script type="module" src="messages.js"></script>

</body>
</html>
