<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="messages_title">My Messages | Marketplace</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .message-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .message-card h4 {
            margin: 0 0 10px;
        }

        .message-actions {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .message-actions button {
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn {
            color: #d9534f;
        }

        .reply-btn {
            color: #007bff;
        }

        .reply-box {
            margin-top: 10px;
            display: none;
        }

        .reply-box textarea {
            width: 100%;
            min-height: 70px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .reply-box button {
            margin-top: 8px;
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .message-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .message-tabs button.active {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<header class="header">
    <h1 data-i18n="messages_title">My Messages</h1>
    <div class="nav">
        <a href="index.html" class="btn">Home</a>
        <a href="myads.html" class="btn">My Ads</a>
    </div>
</header>

<div class="container">

    <!-- Search -->
    <div style="margin:20px 0;">
        <input
            type="text"
            id="msgSearch"
            placeholder="Search Messages"
            style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;"
        >
    </div>

    <!-- Tabs -->
    <div class="message-tabs">
        <button id="btnReceived" class="btn active">Received</button>
        <button id="btnSent" class="btn">Sent</button>
    </div>

    <!-- Messages -->
    <div id="messageList"></div>

</div>

<script>
const STORAGE_KEY = "marketplace_messages";
let currentTab = "received";

// Get logged-in user
function getCurrentUser() {
    return JSON.parse(localStorage.getItem("loggedInUser"));
}

// Load messages
function renderMessages(searchText = "") {
    const user = getCurrentUser();
    const container = document.getElementById("messageList");

    if (!user) {
        container.innerHTML = "<p>Please log in first.</p>";
        return;
    }

    let messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    // Filter by tab
    messages = messages.filter(msg => {
        if (currentTab === "received") {
            return msg.receiverEmail === user.email && !msg.deletedByReceiver;
        } else {
            return msg.senderEmail === user.email && !msg.deletedBySender;
        }
    });

    // Search
    if (searchText.trim()) {
        const query = searchText.toLowerCase();
        messages = messages.filter(msg =>
            (msg.adTitle || "").toLowerCase().includes(query) ||
            (msg.text || "").toLowerCase().includes(query)
        );
    }

    if (messages.length === 0) {
        container.innerHTML = "<p>No messages found.</p>";
        return;
    }

    container.innerHTML = "";

    messages.sort((a, b) => new Date(b.date) - new Date(a.date));

    messages.forEach(msg => {
        const card = document.createElement("div");
        card.className = "message-card";

        const otherPerson = currentTab === "received"
            ? msg.senderEmail
            : msg.receiverEmail;

        card.innerHTML = `
            <h4>Re: ${msg.adTitle || "Marketplace Ad"}</h4>
            <p><strong>${currentTab === "received" ? "From" : "To"}:</strong> ${otherPerson}</p>
            <p>${msg.text}</p>
            <small>${msg.date || ""}</small>

            <div class="message-actions">
                <button class="delete-btn" onclick="deleteMessage('${msg.id}')">Delete</button>

                ${currentTab === "received" ? `
                    <button class="reply-btn" onclick="toggleReply('${msg.id}')">Reply</button>
                ` : ""}
            </div>

            ${currentTab === "received" ? `
                <div class="reply-box" id="reply-box-${msg.id}">
                    <textarea id="reply-text-${msg.id}" placeholder="Type your reply..."></textarea>
                    <button onclick="sendReply('${msg.id}')">Send Reply</button>
                </div>
            ` : ""}
        `;

        container.appendChild(card);
    });
}

// Delete message
function deleteMessage(messageId) {
    if (!confirm("Delete this message?")) return;

    const user = getCurrentUser();
    let messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    messages = messages.map(msg => {
        if (String(msg.id) === String(messageId)) {
            if (msg.receiverEmail === user.email) {
                msg.deletedByReceiver = true;
            }

            if (msg.senderEmail === user.email) {
                msg.deletedBySender = true;
            }
        }
        return msg;
    });

    // Remove fully deleted
    messages = messages.filter(msg => !(msg.deletedByReceiver && msg.deletedBySender));

    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    renderMessages(document.getElementById("msgSearch").value);
}

// Toggle reply box
function toggleReply(messageId) {
    const box = document.getElementById(`reply-box-${messageId}`);
    if (!box) return;

    box.style.display = box.style.display === "block" ? "none" : "block";
}

// Send reply
function sendReply(originalMessageId) {
    const user = getCurrentUser();
    const textArea = document.getElementById(`reply-text-${originalMessageId}`);
    const replyText = textArea.value.trim();

    if (!replyText) {
        alert("Please enter a reply.");
        return;
    }

    const messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const original = messages.find(msg => String(msg.id) === String(originalMessageId));

    if (!original) return;

    const reply = {
        id: Date.now().toString(),
        adTitle: original.adTitle || "Marketplace Ad",
        senderEmail: user.email,
        receiverEmail: original.senderEmail,
        text: replyText,
        date: new Date().toLocaleString()
    };

    messages.push(reply);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));

    alert("Reply sent!");
    renderMessages();
}

// Change tab
function changeTab(tab) {
    currentTab = tab;

    document.getElementById("btnReceived").classList.toggle("active", tab === "received");
    document.getElementById("btnSent").classList.toggle("active", tab === "sent");

    renderMessages(document.getElementById("msgSearch").value);
}

// Event listeners
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btnReceived").addEventListener("click", () => changeTab("received"));
    document.getElementById("btnSent").addEventListener("click", () => changeTab("sent"));

    document.getElementById("msgSearch").addEventListener("input", function() {
        renderMessages(this.value);
    });

    renderMessages();
});
</script>

<script src="main.js"></script>
<script src="languages.js"></script>
<script src="storage.js"></script>

</body>
</html>
